# Source palette: Persona 3 inspired (deep navy + signature blue/cyan accents)

[app]
overall = { bg = "#0a0a1e" }

[mgr]
cwd            = { fg = "#42a5f5", bold = true }
find_keyword   = { fg = "#ff7043", bold = true }
find_position  = { fg = "#8181a4" }
symlink_target = { fg = "#26c6da", italic = true }

marker_copied   = { fg = "#26c6da", bg = "#1a1a38" }
marker_cut      = { fg = "#e53935", bg = "#1a1a38" }
marker_marked   = { fg = "#7e57c2", bg = "#1a1a38" }
marker_selected = { fg = "#42a5f5", bg = "#1a1a38" }

count_copied   = { fg = "#26c6da", bg = "#1a1a38" }
count_cut      = { fg = "#e53935", bg = "#1a1a38" }
count_selected = { fg = "#42a5f5", bg = "#1a1a38" }

border_symbol = "|"
border_style  = { fg = "#35355c" }

[indicator]
parent  = { fg = "#8181a4", bg = "#1a1a38" }
current = { fg = "#42a5f5", bg = "#1a1a38", bold = true }
preview = { fg = "#26c6da", bg = "#1a1a38" }
padding = { open = " ", close = " " }

[tabs]
active    = { fg = "#0a0a1e", bg = "#42a5f5", bold = true }
inactive  = { fg = "#8181a4", bg = "#1a1a38" }
sep_inner = { open = "[", close = "]" }
sep_outer = { open = " ", close = " " }

[mode]
normal_main = { fg = "#0a0a1e", bg = "#1e88e5", bold = true }
normal_alt  = { fg = "#1e88e5", bg = "#1a1a38" }

select_main = { fg = "#0a0a1e", bg = "#7e57c2", bold = true }
select_alt  = { fg = "#7e57c2", bg = "#1a1a38" }

unset_main = { fg = "#0a0a1e", bg = "#e53935", bold = true }
unset_alt  = { fg = "#e53935", bg = "#1a1a38" }

[status]
overall   = { fg = "#e3f2fd", bg = "#1a1a38" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#42a5f5" }
perm_read  = { fg = "#66bb6a" }
perm_write = { fg = "#ffca28" }
perm_exec  = { fg = "#e53935" }
perm_sep   = { fg = "#5c5c78" }

progress_label  = { fg = "#1e88e5", bold = true }
progress_normal = { fg = "#1e88e5", bg = "#35355c" }
progress_error  = { fg = "#e53935", bg = "#35355c" }

[which]
cols = 2
mask            = { fg = "#5c5c78", bg = "#1a1a38" }
cand            = { fg = "#1e88e5", bold = true }
rest            = { fg = "#e3f2fd" }
desc            = { fg = "#8181a4" }
separator       = " -> "
separator_style = { fg = "#35355c" }

[confirm]
border = { fg = "#35355c" }
title  = { fg = "#1e88e5", bold = true }
body   = { fg = "#e3f2fd" }
list   = { fg = "#8181a4" }
btn_yes    = { fg = "#0a0a1e", bg = "#66bb6a", bold = true }
btn_no     = { fg = "#0a0a1e", bg = "#e53935", bold = true }
btn_labels = ["Yes", "No"]

[spot]
border   = { fg = "#35355c" }
title    = { fg = "#1e88e5", bold = true }
tbl_col  = { fg = "#42a5f5", bold = true }
tbl_cell = { fg = "#e3f2fd" }

[notify]
title_info  = { fg = "#42a5f5" }
title_warn  = { fg = "#ffca28" }
title_error = { fg = "#e53935" }

[pick]
border   = { fg = "#35355c" }
active   = { fg = "#1e88e5", bg = "#1a1a38", bold = true }
inactive = { fg = "#8181a4" }

[input]
border   = { fg = "#35355c" }
title    = { fg = "#1e88e5", bold = true }
value    = { fg = "#e3f2fd" }
selected = { fg = "#0a0a1e", bg = "#42a5f5" }

[cmp]
border       = { fg = "#35355c" }
active       = { fg = "#1e88e5", bg = "#1a1a38", bold = true }
inactive     = { fg = "#8181a4" }
icon_file    = "F"
icon_folder  = "D"
icon_command = "C"

[tasks]
border  = { fg = "#35355c" }
title   = { fg = "#1e88e5", bold = true }
hovered = { fg = "#1e88e5", bg = "#1a1a38", bold = true }

[help]
on      = { fg = "#1e88e5", bold = true }
run     = { fg = "#66bb6a" }
desc    = { fg = "#8181a4" }
hovered = { fg = "#1e88e5", bg = "#1a1a38", bold = true }
footer  = { fg = "#5c5c78" }
icon_info  = "i"
icon_warn  = "!"
icon_error = "x"

[filetype]
rules = [
  { mime = "image/*", fg = "#ffca28" },
  { mime = "{audio,video}/*", fg = "#7e57c2" },
  { mime = "inode/empty", fg = "#1e88e5" },
  { url = "*", is = "orphan", fg = "#e53935" },
  { url = "*/", fg = "#42a5f5" }
]
